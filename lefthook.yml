---
pre-commit:
  parallel: true
  commands:
    deadnix:
      glob: "*.nix"
      run: timeout 30 deadnix --fail -L {staged_files}
    nixfmt:
      glob: "*.nix"
      run: timeout 30 nixfmt --check {staged_files}
    statix:
      glob: "*.nix"
      run: |
        for f in {staged_files}; do
          timeout 30 statix check "$f" || exit 1
        done
    nix-flake-check:
      glob: "*.nix"
      run: timeout 300 nix flake check
    yamllint:
      glob: "*.{yml,yaml}"
      run: timeout 30 yamllint {staged_files}
    typos:
      run: timeout 30 typos {staged_files}
    editorconfig-checker:
      run: timeout 30 editorconfig-checker {staged_files}
    trailing-whitespace:
      run: timeout 30 grep -rlP '\s+$' {staged_files} && exit 1 || true
    missing-final-newline:
      run: |
        for f in {staged_files}; do
          [ -s "$f" ] && [ -n "$(tail -c 1 "$f")" ] && echo "missing newline: $f" && exit 1
        done
        true
    git-conflict-markers:
      run: timeout 30 grep -rlP '<{6}|>{6}|={7}' {staged_files} && exit 1 || true

pre-push:
  parallel: true
  commands:
    deadnix:
      glob: "*.nix"
      run: timeout 30 deadnix --fail -L {push_files}
