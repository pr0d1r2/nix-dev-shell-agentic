---
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Install lefthook and sync remotes
        run: >-
          TERM=dumb nix develop .#ci --ignore-environment --keep TERM
          --command bash -c
          'export NIX_CONFIG="experimental-features = nix-command flakes";
          lefthook install'
      - name: Pre-commit checks
        run: >-
          TERM=dumb nix develop .#ci --ignore-environment --keep TERM
          --command bash -c
          'export NIX_CONFIG="experimental-features = nix-command flakes";
          LEFTHOOK_NIX_FLAKE_CHECK_TIMEOUT=300
          lefthook run pre-commit --all-files'
      - name: Pre-push checks
        run: >-
          TERM=dumb nix develop .#ci --ignore-environment --keep TERM
          --command bash -c
          'export NIX_CONFIG="experimental-features = nix-command flakes";
          lefthook run pre-push --all-files'

  build:
    needs: lint
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - uses: cachix/cachix-action@v16
        with:
          name: pr0d1r2
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build RTK
        run: nix build .#rtk
      - name: Check flake
        run: nix flake check
