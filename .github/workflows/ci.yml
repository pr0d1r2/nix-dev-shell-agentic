---
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pr0d1r2/nix-lefthook-ci-action@e5076886865ac3aed148127ea3aa7269ffcf6989
        with:
          extra-env: >-
            export NIX_CONFIG="experimental-features = nix-command flakes";
          flake-check-timeout: '300'
          skip-build: 'true'
          skip-pre-commit: 'true'

  lint-macos:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pr0d1r2/nix-lefthook-ci-action@e5076886865ac3aed148127ea3aa7269ffcf6989
        with:
          extra-env: >-
            export NIX_CONFIG="experimental-features = nix-command flakes";
          flake-check-timeout: '300'
          skip-build: 'true'
          skip-pre-commit: 'true'

  build:
    needs: lint-linux
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      - uses: cachix/cachix-action@v17
        with:
          name: pr0d1r2
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build RTK
        run: nix build .#rtk
      - name: Check flake
        run: nix flake check

  build-linux-arm:
    needs: lint-linux
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      - uses: cachix/cachix-action@v17
        with:
          name: pr0d1r2
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build RTK
        run: nix build .#rtk
      - name: Check flake
        run: nix flake check
